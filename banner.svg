<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" width="1280" height="400" role="img" aria-label="Algorithm Remover — your friends, not the algorithm">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e0e14"/>
      <stop offset="1" stop-color="#17131f"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7A3AE0"/>
      <stop offset="0.55" stop-color="#F0286B"/>
      <stop offset="1" stop-color="#FF9A3D"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="400" fill="url(#bg)"/>
  <rect x="0" y="396" width="1280" height="4" fill="url(#brand)"/>

  <!-- app icon -->
  <g transform="translate(72,86)">
    <rect width="96" height="96" rx="23" fill="url(#brand)"/>
    <circle cx="48" cy="48" r="28" fill="none" stroke="#ffffff" stroke-width="9.5"/>
    <line x1="28.2" y1="28.2" x2="67.8" y2="67.8" stroke="#ffffff" stroke-width="9.5" stroke-linecap="round"/>
  </g>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
    <!-- title -->
    <text x="200" y="128" font-size="54" font-weight="700" fill="#f5f5f8">Algorithm Remover</text>
    <text x="202" y="170" font-size="23" fill="#c1b0ef">Your friends. Not the algorithm.</text>
    <text x="202" y="203" font-size="14" letter-spacing="2.5" fill="#7d7d8a">INSTAGRAM &amp; FACEBOOK · CHROME &amp; FIREFOX</text>

    <!-- removed column -->
    <text x="204" y="272" font-size="15" font-weight="700" letter-spacing="1.5" fill="#ff6b7d">REMOVED</text>
    <g font-size="19" fill="#d6a2ab">
      <text x="204" y="308"><tspan fill="#ff6b7d" font-weight="700">✕</tspan>  Algorithmic feed</text>
      <text x="204" y="340"><tspan fill="#ff6b7d" font-weight="700">✕</tspan>  Explore grid</text>
      <text x="204" y="372"><tspan fill="#ff6b7d" font-weight="700">✕</tspan>  Reels scroll-trap</text>
    </g>
    <g font-size="19" fill="#d6a2ab">
      <text x="470" y="308"><tspan fill="#ff6b7d" font-weight="700">✕</tspan>  Suggested accounts</text>
      <text x="470" y="340"><tspan fill="#ff6b7d" font-weight="700">✕</tspan>  Sponsored posts</text>
      <text x="470" y="372"><tspan fill="#ff6b7d" font-weight="700">✕</tspan>  Endless scrolling</text>
    </g>

    <!-- kept column -->
    <text x="812" y="272" font-size="15" font-weight="700" letter-spacing="1.5" fill="#57d9a3">KEPT</text>
    <g font-size="19" fill="#a7d9c6">
      <text x="812" y="308"><tspan fill="#57d9a3" font-weight="700">✓</tspan>  Friends' posts</text>
      <text x="812" y="340"><tspan fill="#57d9a3" font-weight="700">✓</tspan>  Stories &amp; DMs</text>
      <text x="812" y="372"><tspan fill="#57d9a3" font-weight="700">✓</tspan>  Search</text>
    </g>
    <g font-size="19" fill="#a7d9c6">
      <text x="1044" y="308"><tspan fill="#57d9a3" font-weight="700">✓</tspan>  Chronological</text>
      <text x="1044" y="340"><tspan fill="#57d9a3" font-weight="700">✓</tspan>  Notifications</text>
      <text x="1044" y="372"><tspan fill="#57d9a3" font-weight="700">✓</tspan>  Messenger</text>
    </g>

    <!-- vertical divider -->
    <line x1="760" y1="252" x2="760" y2="384" stroke="#2a2a33" stroke-width="2"/>
  </g>
</svg>
